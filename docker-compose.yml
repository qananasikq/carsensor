services:
  mongo:
    image: mongo:7
    container_name: carsensor-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: carsensor-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      mongo:
        condition: service_healthy
      python-service:
        condition: service_started

  python-service:
    build:
      context: .
      dockerfile: python-service/Dockerfile
    container_name: carsensor-python-service
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: carsensor-scraper
    restart: unless-stopped
    env_file:
      - scraper/.env
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: carsensor-frontend
    restart: unless-stopped
    env_file:
      - frontend/.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
